<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chapter 1 Summary Mindmap</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    

    <style>

        * {

            box-sizing: border-box;

            margin: 0;

            padding: 0;

            font-family: 'Cairo', sans-serif;

        }



        body {

            background-color: #f8fafc;

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            padding: 20px;

            color: #1e293b;

        }



        .container {

            width: 100%;

            max-width: 1550px;

            background-color: #ffffff;

            border-radius: 24px;

            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.05);

            padding: 30px 20px;

            position: relative;

            overflow: visible;

        }



        .toolbar {

            position: absolute;

            top: 40px;

            right: 60px; 

            z-index: 100;

        }



        .btn-print {

            background-color: #2563eb;

            color: #ffffff;

            border: none;

            padding: 10px 22px;

            border-radius: 10px;

            font-size: 14px;

            font-weight: 700;

            cursor: pointer;

            transition: all 0.2s ease;

            display: flex;

            align-items: center;

            gap: 8px;

            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);

        }



        .btn-print:hover {

            background-color: #1d4ed8;

            transform: translateY(-1px);

            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);

        }



        .mindmap-svg {

            width: 100%;

            height: auto;

            display: block;

        }



        text {

            fill: #1e293b;

            user-select: none;

        }



        .center-node rect {

            fill: url(#centerGrad);

            stroke: #1d4ed8;

            stroke-width: 1px;

        }



        .center-node text {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            font-weight: 700;

            font-size: 24px;

            fill: #ffffff;

            letter-spacing: 0.5px;

        }



        .branch-title {

            font-weight: 700;

            font-size: 16px;

            fill: #2f3a53;

        }



        .connection-line {

            fill: none;

            stroke: #cbd5e1;

            stroke-width: 2;

            stroke-linecap: round;

        }



        .connection-line.main {

            stroke: #94a3b8;

            stroke-width: 3;

        }



        .device-text {

            font-size: 13px;

            font-weight: 600;

            fill: #334155;

        }



        .badge-rect {

            rx: 6px;

            ry: 6px;

        }



        @media print {

            .toolbar { display: none; }

            body { background-color: #ffffff; padding: 0; }

            .container { box-shadow: none; padding: 0; }

        }

    </style>

</head>
